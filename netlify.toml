# Next.js on Netlify requires the official runtime (OpenNext adapter).
# Do NOT set `publish = ".next"` alone — that deploys raw build output as static files
# and breaks routing (404 on every path including `/`).
#
# https://docs.netlify.com/integrations/frameworks/next-js/overview/

[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"
